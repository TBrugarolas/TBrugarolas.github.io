<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />

    <title>Tim Brugarolas | Contact</title>
    <link rel="stylesheet" href="myStyle.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="images/favicon.png" />
  </head>
  <body class="flex flex-col min-h-screen bg-cover bg-center" style="background-image:url('images/background_light.png')">
    <header>
      <nav class="relative border-t border-b border-gray-400 px-4 py-2 font-bold z-50">
        <!-- Header Row -->
        <div class="flex items-center w-full">
          <h1 class="text-2xl md:text-3xl font-bold">
            Tim Brugarolas
          </h1>

          <!-- Desktop Menu -->
          <ul class="hidden md:flex ml-auto list-none p-0 m-0">
            <li class="px-4 py-2"><a href="index.html" class="text-gray-600 hover:text-green-400">Home</a></li>
            <li class="px-4 py-2"><a href="about.html" class="text-gray-600 hover:text-green-400">About</a></li>
            <li class="px-4 py-2"><a href="Brugarolas_Timothy_Resume.pdf" target="_blank" rel="noopener noreferrer" class="text-gray-600 hover:text-green-400">Resume</a></li>
            <li class="px-4 py-2"><a href="research.html" class="text-gray-600 hover:text-green-400">Research / Projects</a></li>
            <li class="px-4 py-2"><a href="contact.html" class="text-gray-600 hover:text-green-400">Contact</a></li>
          </ul>

          <!-- Hamburger (mobile only) -->
          <button
            id="menu-btn"
            class="md:hidden ml-auto text-gray-700 focus:outline-none"
            aria-label="Toggle menu"
          >
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>

        <!-- Mobile Dropdown -->
        <ul
          id="menu"
          class="absolute right-4 top-full mt-2 hidden
                md:hidden
                flex-col
                bg-white
                border border-gray-300
                shadow-md
                list-none p-2"
        >
          <li class="px-4 py-2"><a href="index.html" class="text-gray-600 hover:text-green-400">Home</a></li>
          <li class="px-4 py-2"><a href="about.html" class="text-gray-600 hover:text-green-400">About</a></li>
          <li class="px-4 py-2"><a href="Brugarolas_Timothy_Resume.pdf" target="_blank" rel="noopener noreferrer" class="text-gray-600 hover:text-green-400">Resume</a></li>
          <li class="px-4 py-2"><a href="research.html" class="text-gray-600 hover:text-green-400">Research / Projects</a></li>
          <li class="px-4 py-2"><a href="contact.html" class="text-gray-600 hover:text-green-400">Contact</a></li>
        </ul>
      </nav>

      <script>
        const menuBtn = document.getElementById("menu-btn");
        const menu = document.getElementById("menu");

        menuBtn.addEventListener("click", () => {
          menu.classList.toggle("hidden");
        });
      </script>
    </header>
    <main class="flex flex-col items-center justify-center mt-12">
      <h1 class="text-4xl md:text-5xl font-bold mb-8">It's been real.</h1>
      <ul class="flex gap-4">
        <li>
          <a href="https://www.linkedin.com/in/tim-brugarolas/" target="_blank">
            <img src="images/linkedin.png" alt="LinkedIn" class="w-8 h-8 hover:-translate-y-1 hover:shadow-lg transition" />
          </a>
        </li>
        <li>
          <a href="https://github.com/TBrugarolas" target="_blank">
            <img src="images/github.svg" alt="GitHub" class="w-8 h-8 hover:-translate-y-1 hover:shadow-lg transition" />
          </a>
        </li>
        <li>
          <a href="https://www.chess.com/member/rubberchickengod" target="_blank">
            <img src="images/chess.png" alt="Chess.com" class="w-8 h-8 hover:-translate-y-1 hover:shadow-lg transition" />
          </a>
        </li>
        <li>
          <a href="mailto:tbrugarolas@berkeley.edu">
            <img src="images/email.png" alt="Email" class="w-8 h-8 hover:-translate-y-1 hover:shadow-lg transition" />
          </a>
        </li>
      </ul>
    </main>
    <footer class="flex justify-center py-4 text-gray-600 text-sm mt-auto">
      <p>Made by Tim Brugarolas</p>
    </footer>

</html>
